<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Diagnostic - Hotels & Rooms</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            max-height: 400px;
            overflow-y: auto;
        }
        .success {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        .error {
            border-color: #f44336;
            background: #ffebee;
        }
        pre {
            background: #263238;
            color: #aed581;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        .status-200 { background: #4caf50; color: white; }
        .status-401 { background: #ff9800; color: white; }
        .status-403 { background: #f44336; color: white; }
        .status-404 { background: #9e9e9e; color: white; }
        .hotel-card {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        .hotel-card h3 {
            margin: 0 0 10px 0;
            color: #667eea;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }
        .info-item {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }
        .info-label {
            font-weight: bold;
            color: #666;
            font-size: 12px;
        }
        .info-value {
            color: #333;
            font-size: 16px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 StayOS API Diagnostic Tool</h1>
        <p>Use this tool to test if the hotels and rooms APIs are working correctly.</p>

        <div class="test-section">
            <h2>📋 Step 1: Check Authentication</h2>
            <button onclick="checkAuth()">Check Local Storage</button>
            <div id="auth-result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>🏨 Step 2: Test Hotels API</h2>
            <button onclick="testHotelsAPI()">GET /api/v1/hotels/</button>
            <button onclick="testHotelsAPIRaw()">GET /api/v1/hotels/ (Raw)</button>
            <div id="hotels-result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>🚪 Step 3: Test Rooms API</h2>
            <button onclick="testRoomsAPI()">GET /api/v1/rooms</button>
            <div id="rooms-result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>📊 Step 4: Database Check</h2>
            <button onclick="checkDatabase()">Run Database Check</button>
            <div id="db-result" class="result"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        function checkAuth() {
            const resultDiv = document.getElementById('auth-result');
            const token = localStorage.getItem('access_token');
            const tenantId = localStorage.getItem('tenant_id');
            const user = localStorage.getItem('user') || localStorage.getItem('super_admin_user');

            let html = '<h3>🔑 Authentication Status</h3>';
            html += '<div class="info-grid">';
            html += `<div class="info-item"><div class="info-label">Access Token</div><div class="info-value">${token ? '✅ Present (' + token.substring(0, 20) + '...)' : '❌ Missing'}</div></div>`;
            html += `<div class="info-item"><div class="info-label">Tenant ID</div><div class="info-value">${tenantId || '❌ Missing'}</div></div>`;
            html += `<div class="info-item"><div class="info-label">User Data</div><div class="info-value">${user ? '✅ Present' : '❌ Missing'}</div></div>`;
            html += '</div>';

            if (!token) {
                html += '<p style="color: #f44336; margin-top: 15px;">⚠️ <strong>Not authenticated!</strong> Please login at <a href="http://localhost:3000/login" target="_blank">http://localhost:3000/login</a></p>';
            } else {
                html += '<p style="color: #4caf50; margin-top: 15px;">✅ You are logged in. Token will be sent with API requests.</p>';
            }

            resultDiv.innerHTML = html;
            resultDiv.className = 'result ' + (token ? 'success' : 'error');
        }

        async function testHotelsAPI() {
            const resultDiv = document.getElementById('hotels-result');
            resultDiv.innerHTML = '<p>🔄 Fetching hotels...</p>';

            try {
                const token = localStorage.getItem('access_token');
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch(`${API_BASE}/api/v1/hotels/?limit=100`, {
                    headers: headers
                });

                const data = await response.json();

                let html = `<h3>🏨 Hotels API Response</h3>`;
                html += `<p>Status: <span class="status-badge status-${response.status}">${response.status} ${response.statusText}</span></p>`;
                html += `<p>Hotels found: <strong>${Array.isArray(data) ? data.length : 0}</strong></p>`;

                if (Array.isArray(data) && data.length > 0) {
                    html += '<div style="margin-top: 15px;">';
                    data.forEach(hotel => {
                        html += `
                            <div class="hotel-card">
                                <h3>${hotel.name}</h3>
                                <div class="info-grid">
                                    <div class="info-item"><div class="info-label">ID</div><div class="info-value">${hotel.id}</div></div>
                                    <div class="info-item"><div class="info-label">City</div><div class="info-value">${hotel.city || 'N/A'}</div></div>
                                    <div class="info-item"><div class="info-label">Country</div><div class="info-value">${hotel.country || 'N/A'}</div></div>
                                    <div class="info-item"><div class="info-label">Star Rating</div><div class="info-value">${hotel.star_rating || 'N/A'} ⭐</div></div>
                                    <div class="info-item"><div class="info-label">Starting Price</div><div class="info-value">$${hotel.starting_price || 0}</div></div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    resultDiv.className = 'result success';
                } else {
                    html += '<p style="color: #f44336;">❌ No hotels returned! This is the problem.</p>';
                    html += '<p>Possible reasons:</p>';
                    html += '<ul>';
                    html += '<li>No hotels exist in database</li>';
                    html += '<li>Hotels are not marked as active (is_active = false)</li>';
                    html += '<li>Tenant is deleted (is_deleted = true)</li>';
                    html += '</ul>';
                    resultDiv.className = 'result error';
                }

                html += '<details style="margin-top: 15px;"><summary>📄 Raw Response</summary><pre>' + JSON.stringify(data, null, 2) + '</pre></details>';

                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ Error</h3>
                    <p style="color: #f44336;">${error.message}</p>
                    <p>Possible causes:</p>
                    <ul>
                        <li>Backend server not running on port 8000</li>
                        <li>CORS issue</li>
                        <li>Network error</li>
                    </ul>
                    <pre>${error.stack}</pre>
                `;
                resultDiv.className = 'result error';
            }
        }

        async function testHotelsAPIRaw() {
            window.open(`${API_BASE}/api/v1/hotels/?limit=100`, '_blank');
        }

        async function testRoomsAPI() {
            const resultDiv = document.getElementById('rooms-result');
            resultDiv.innerHTML = '<p>🔄 Fetching rooms...</p>';

            try {
                const token = localStorage.getItem('access_token');
                const headers = {};
                if (token) {
                    headers['Authorization'] = `Bearer ${token}`;
                }

                const response = await fetch(`${API_BASE}/api/v1/rooms`, {
                    headers: headers
                });

                const data = await response.json();

                let html = `<h3>🚪 Rooms API Response</h3>`;
                html += `<p>Status: <span class="status-badge status-${response.status}">${response.status} ${response.statusText}</span></p>`;
                html += `<p>Rooms found: <strong>${Array.isArray(data) ? data.length : (data.rooms ? data.rooms.length : 0)}</strong></p>`;

                const rooms = Array.isArray(data) ? data : (data.rooms || []);
                if (rooms.length > 0) {
                    html += '<p style="color: #4caf50;">✅ Rooms API is working!</p>';
                    resultDiv.className = 'result success';
                } else {
                    html += '<p style="color: #f44336;">❌ No rooms returned!</p>';
                    resultDiv.className = 'result error';
                }

                html += '<details style="margin-top: 15px;"><summary>📄 Raw Response</summary><pre>' + JSON.stringify(data, null, 2) + '</pre></details>';

                resultDiv.innerHTML = html;

            } catch (error) {
                resultDiv.innerHTML = `
                    <h3>❌ Error</h3>
                    <p style="color: #f44336;">${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
                resultDiv.className = 'result error';
            }
        }

        function checkDatabase() {
            const resultDiv = document.getElementById('db-result');
            resultDiv.innerHTML = `
                <h3>📊 Next Steps</h3>
                <p>To check your database directly, run this command in your terminal:</p>
                <pre>cd /home/uk-bai/C_file/Hotel\\ project/1
python3 check_hotels_rooms.py</pre>
                <p>This will show you:</p>
                <ul>
                    <li>How many tenants exist</li>
                    <li>How many hotels exist</li>
                    <li>How many rooms exist</li>
                    <li>Hotel IDs, names, and active status</li>
                    <li>Room IDs, numbers, and hotel associations</li>
                </ul>
                <p style="margin-top: 15px;"><strong>Common Issue:</strong> Hotels might exist but have <code>is_active = false</code>, which prevents them from showing in the public API.</p>
            `;
            resultDiv.className = 'result';
        }
    </script>
</body>
</html>
